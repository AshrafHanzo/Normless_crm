services:
  - type: web
    name: normless-crm-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: /tmp/crm.db
      - key: JWT_SECRET
        sync: false
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        value: https://normless.store
      - key: FRONTEND_URL
        value: https://normless.store

crons:
  - id: keep-alive
    service: normless-crm-api
    schedule: "*/14 * * * *"
    httpPath: /api/health
